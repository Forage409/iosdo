name: NowJot
options:
  bundleIdPrefix: com.quang
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
targets:
  NowJot:
    type: application
    platform: iOS
    sources: [NowJot]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.quang.nowjot
        INFOPLIST_FILE: NowJot/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
